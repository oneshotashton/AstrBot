name: "PR Checklist Validator"

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR Checklist
        uses: tzkhan/pr-checklist-action@v1
        with:
          # This ensures all [ ] boxes are converted to [x]
          require-all: true
          # Optional: Custom message if they forgot something
          message: "⚠️ Please ensure all items in the PR checklist are completed before requesting a review."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
