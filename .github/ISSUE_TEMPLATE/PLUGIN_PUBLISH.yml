name: Bug Report
description: Report a technical issue or unexpected behavior.
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much detail as possible to help us resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe what is happening and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      value: |
        1. Open the terminal/app
        2. Run command '...'
        3. See error
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment / OS
      placeholder: e.g., iOS a-Shell, Node v25, Windows 10
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      placeholder: Paste terminal output or error messages here.
  - type: checkboxes
    id: ethical_check
    attributes:
      label: Verification
      options:
        - label: I have checked that this issue is not a duplicate.
          required: true
